spring.application.name=registry-service
# =========== MySQL Config ============
spring.datasource.url=jdbc:mysql://localhost:3306/userWeather
spring.datasource.username=root
spring.datasource.password=myUserRoot
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========== JPA Settings ============
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect



#spring.security.oauth2.authorizationserver.issuer=http://localhost:9000

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.feign=DEBUG